set -g mouse on
set -s escape-time 0
set -g status-interval 1
set -g base-index 1

unbind C-b
set -g prefix `
bind-key ` last-window
bind-key e send-prefix

bind / split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind w confirm-before -p "Kill current pane? (y/n) " kill-pane
bind n new-window -c "#{pane_current_path}"

bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up select-pane -U
bind -n S-Down select-pane -D

bind -n C-S-Left  previous-window
bind -n C-S-Right next-window

set -g window-status-current-format ' #[fg=colour137]#(pwd="#{pane_current_path}"; echo ${pwd####*/})#[fg=colour50]#F '
set -g window-status-format ' #(pwd="#{pane_current_path}"; echo ${pwd####*/}) '

set -g status-style fg=colour250,bg=colour234
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%a #[fg=colour233,bg=colour245,bold] %H:%M '


set -g pane-border-style fg=colour234
set -g pane-active-border-style fg=colour234
set-option -g history-limit 5000

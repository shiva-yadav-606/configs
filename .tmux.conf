set-option -g default-shell "/bin/zsh"
set -g mouse on
set -s escape-time 0
set -g status-interval 1
set -g base-index 1

unbind C-b
set -g prefix `
bind-key ` last-window
bind-key e send-prefix

bind / split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind w confirm-before -p "Kill current pane? (y/n) " kill-pane
bind n new-window -c "#{pane_current_path}"

set -g status-style bg=#1e1e2e
set -g window-status-current-format ' #I#[fg=#8a8a8a]:#[fg=#eeeeee]#(pwd="#{pane_current_path}"; echo ${pwd####*/}) '
set -g window-status-format ' #I#[fg=#8a8a8a]:#(pwd="#{pane_current_path}"; echo ${pwd####*/}) '
set -g status-left ''
set -g status-right '#[fg=#8a8a8a]%d %A #[fg=#eeeeee]%I:%M '
set -g pane-border-style fg=colour234
set -g pane-active-border-style fg=colour234

set-option -g history-limit 5000
